<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>WeatherDash</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div th:replace="~{layout :: navbar(activePage='dashboard')}"></div>

<main class="page">
    <div class="container">
        <header class="page-header">
            <h1><i class="fas fa-cloud-sun"></i> Weather Dashboard</h1>
            <p class="subtitle">Get real-time weather, forecasts, and astronomy data for any city worldwide.</p>
        </header>

        <div th:if="${error}" class="alert-error" role="alert">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
        </div>

        <section class="grid grid-3" aria-label="Main actions">
            <article class="card">
                <h2><i class="fas fa-thermometer-half"></i> Current Weather</h2>
                <p class="subtitle">Live conditions and detailed metrics.</p>
                <form th:action="@{/weather}" method="get">
                    <label for="weather-city">Search City</label>
                    <input id="weather-city" type="text" name="city" placeholder="e.g. London, Tokyo, Sydney" required/>
                    <button class="btn" type="submit"><i class="fas fa-search"></i> View Weather</button>
                </form>
            </article>

            <article class="card">
                <h2><i class="fas fa-calendar-days"></i> 3-Day Forecast</h2>
                <p class="subtitle">Plan ahead with hourly details.</p>
                <form th:action="@{/forecast}" method="get">
                    <label for="forecast-city">Search City</label>
                    <input id="forecast-city" type="text" name="city" placeholder="e.g. New York, Paris, Dubai" required/>
                    <button class="btn" type="submit"><i class="fas fa-search"></i> View Forecast</button>
                </form>
            </article>

            <article class="card">
                <h2><i class="fas fa-moon"></i> Astronomy</h2>
                <p class="subtitle">Sunrise, sunset, moon phase info.</p>
                <form th:action="@{/astronomy}" method="get">
                    <label for="astro-city">Search City</label>
                    <input id="astro-city" type="text" name="city" placeholder="e.g. Tokyo, Berlin, Cairo" required/>
                    <button class="btn" type="submit"><i class="fas fa-search"></i> View Astronomy</button>
                </form>
            </article>
        </section>
    </div>
</main>

</body>
</html>

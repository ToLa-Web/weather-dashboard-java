<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Error</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .error-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            padding: 20px;
        }

        .error-card {
            text-align: center;
            background: linear-gradient(135deg, #1a1f2e 0%, #16202b 100%);
            border: 1px solid rgba(100, 200, 255, 0.2);
            border-radius: 12px;
            padding: 50px;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .error-icon {
            font-size: 4rem;
            color: #ff6b6b;
            margin-bottom: 20px;
        }

        .error-code {
            font-size: 3rem;
            font-weight: 700;
            color: #64c8ff;
            margin-bottom: 10px;
        }

        .error-message {
            font-size: 1.1rem;
            color: #e0e0e0;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .error-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .error-actions a,
        .error-actions button {
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #64c8ff 0%, #4ab8ff 100%);
            color: #0f1419;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(100, 200, 255, 0.3);
        }

        .btn-secondary {
            background: rgba(100, 200, 255, 0.1);
            color: #64c8ff;
            border: 2px solid #64c8ff;
        }

        .btn-secondary:hover {
            background: rgba(100, 200, 255, 0.2);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div th:replace="~{layout :: navbar(activePage='error')}"></div>

<main class="page">
    <div class="error-container">
        <div class="error-card">
            <div class="error-icon">
                <i class="fas fa-exclamation-circle"></i>
            </div>
            <div class="error-code" th:text="${statusCode} ?: '500'">500</div>
            <div class="error-message" th:text="${error} ?: 'An unexpected error occurred'">
                An unexpected error occurred
            </div>
            <div class="error-actions">
                <a href="/" class="btn-primary">
                    <i class="fas fa-home"></i> Back to Home
                </a>
                <button class="btn-secondary" onclick="history.back()">
                    <i class="fas fa-arrow-left"></i> Go Back
                </button>
            </div>
        </div>
    </div>
</main>

</body>
</html>

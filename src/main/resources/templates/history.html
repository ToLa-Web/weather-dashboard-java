<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Search History</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div th:replace="~{layout :: navbar(activePage='history')}"></div>

<main class="page">
    <div class="container">
        <header class="page-header">
            <h1><i class="fas fa-history"></i> Search History</h1>
            <p class="subtitle">Recent weather queries you've searched.</p>
        </header>

        <div th:if="${historyList.empty}" class="empty-state">
            <i class="fas fa-search"></i> No search history yet. Start by searching for a city on the dashboard.
        </div>

        <div th:if="${!historyList.empty}" class="history-table-wrap">
            <table class="history-table">
                <thead>
                <tr>
                    <th><i class="fas fa-map-marker-alt"></i> City</th>
                    <th><i class="fas fa-thermometer-half"></i> Temp (°C)</th>
                    <th><i class="fas fa-cloud"></i> Description</th>
                    <th><i class="fas fa-droplet"></i> Humidity</th>
                    <th><i class="fas fa-wind"></i> Wind (km/h)</th>
                    <th><i class="fas fa-exclamation-circle"></i> Alert</th>
                    <th><i class="fas fa-clock"></i> Searched At</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="entry : ${historyList}">
                    <td>
                        <a th:href="@{/weather(city=${entry.cityName})}" style="color: var(--primary); font-weight: 700;" th:text="${entry.cityName}">City</a>
                    </td>
                    <td style="font-weight: 700;" th:text="${entry.temperature}">--</td>
                    <td th:text="${entry.description}">--</td>
                    <td th:text="${entry.humidity} + '%'">--%</td>
                    <td th:text="${entry.windSpeed}">--</td>
                    <td>
                        <span th:if="${entry.alert}" class="badge-alert">
                            <i class="fas fa-triangle-exclamation"></i> <span th:text="${entry.alert}"></span>
                        </span>
                        <span th:unless="${entry.alert}" class="badge-ok">
                            <i class="fas fa-check-circle"></i> Clear
                        </span>
                    </td>
                    <td th:text="${#temporals.format(entry.searchTime, 'dd MMM yyyy HH:mm')}">--</td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination Controls -->
        <div th:if="${!historyList.empty}" class="pagination-container" style="margin-top: 30px; text-align: center;">
            <div class="pagination" style="display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; align-items: center;">
                <!-- Previous Button -->
                <a th:if="${currentPage > 0}"
                   th:href="@{/history(page=${currentPage - 1})}"
                   class="btn"
                   style="padding: 8px 15px; font-size: 0.9rem;">
                    <i class="fas fa-chevron-left"></i> Previous
                </a>
                <span th:unless="${currentPage > 0}" class="btn" style="padding: 8px 15px; opacity: 0.5; cursor: not-allowed;">
                    <i class="fas fa-chevron-left"></i> Previous
                </span>

                <!-- Page Info -->
                <span style="font-weight: 600; color: var(--primary); min-width: 120px;">
                    Page <span th:text="${currentPage + 1}">1</span> of <span th:text="${totalPage}">1</span>
                </span>

                <!-- Next Button -->
                <a th:if="${currentPage + 1 < totalPage}"
                   th:href="@{/history(page=${currentPage + 1})}"
                   class="btn"
                   style="padding: 8px 15px; font-size: 0.9rem;">
                    Next <i class="fas fa-chevron-right"></i>
                </a>
                <span th:unless="${currentPage + 1 < totalPage}" class="btn" style="padding: 8px 15px; opacity: 0.5; cursor: not-allowed;">
                    Next <i class="fas fa-chevron-right"></i>
                </span>
            </div>
        </div>

        <div class="action-links">
            <a th:href="@{/}"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        </div>
    </div>
</main>

</body>
</html>

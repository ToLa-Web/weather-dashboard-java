<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📜 Weather History</h2>
        <a th:href="@{/}" class="btn btn-secondary">Back to Dashboard</a>
    </div>

    <div class="table-responsive bg-white p-3 rounded shadow-sm">
        <table class="table table-hover">
            <thead class="table-dark">
            <tr>
                <th>City</th>
                <th>Temp</th>
                <th>Condition</th>
                <th>Time</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="h : ${historyList}">
                <td th:text="${h.cityName}">City</td>
                <td th:text="${h.temperature} + '°C'">Temp</td>
                <td th:text="${h.description}">Condition</td>
                <td th:text="${#temporals.format(h.searchTime, 'HH:mm')}">Time</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>

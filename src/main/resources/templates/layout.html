<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header th:fragment="navbar(activePage)" class="topbar">
    <nav class="navbar container" aria-label="Main navigation">
        <a class="brand" th:href="@{/}" aria-label="WeatherDash home">
            <i class="fas fa-cloud-sun"></i> WeatherDash
        </a>
        <div class="nav-links">
            <a th:href="@{/}" th:classappend="${activePage == 'dashboard'} ? 'active' : ''">
                <i class="fas fa-home"></i> Dashboard
            </a>
            <a th:href="@{/history}" th:classappend="${activePage == 'history'} ? 'active' : ''">
                <i class="fas fa-history"></i> History
            </a>
        </div>
    </nav>
</header>

</body>
</html>
